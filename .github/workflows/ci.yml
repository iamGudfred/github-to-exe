name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Lint with flake8 (if available)
      run: |
        # Install flake8 and run basic linting
        pip install flake8
        flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics || true

    - name: Test Flask app startup
      run: |
        # Test basic import from project root
        python -c "from backend.app import app; print('Flask app imported successfully')"

    - name: Run basic health check
      run: |
        # Start the Flask app in background and test health endpoint
        python -m backend.app &
        sleep 5
        curl -f http://localhost:5001/api/health || echo "Health check failed, but continuing..."
        pkill -f "python -m backend.app" || true

  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Build Docker image
      run: docker build -t github-to-exe .

    - name: Test Docker image
      run: |
        docker run -d -p 5001:5001 --name test-container github-to-exe
        sleep 10
        curl -f http://localhost:5001/api/health || echo "Docker health check failed"
        docker stop test-container
        docker rm test-container